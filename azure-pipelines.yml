# Python package
# Create and test a Python package on multiple Python versions.
# Add steps that analyze code, save the dist with the build record, publish to a PyPI-compatible index, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/python


trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: flask-vars

stages:
- stage: Build
  displayName: 'Build and Quality Stage'
  jobs:
  - job: BuildJob
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.9'
      displayName: 'Use Python 3.9'

    - task: PipAuthenticate@1
      displayName: 'Pip Authenticate'
      inputs:
        artifactFeeds: 'bdanailov36'
        onlyCheckSecondaryRepos: true

    - script: |
        python -m pip install --upgrade pip
        pip install Flask pytest bandit pytest-azurepipelines --index-url https://pypi.org/simple
        pip install -r requirements.txt --extra-index-url https://pkgs.dev.azure.com/bdanailov36/_packaging/bdanailov36/pypi/simple
      displayName: 'Install dependencies'
      
    - script: |
        pip install pytest pytest-azurepipelines
        pytest
      displayName: 'Run Functional Tests'

    - script: |
        pip install bandit
        bandit -r . -f txt -ll  # The -ll flag means "Level Low" and above, but won't exit with error 1 for Low
      displayName: 'Run Nonfunctional Security Scan'
      continueOnError: true

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)'
        artifact: 'drop'
        publishLocation: 'pipeline'
      displayName: 'Publish Build Artifacts'

- stage: Deploy
  displayName: 'Release and Docker Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployWeb
    displayName: 'Deploy to Production'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              containerRegistry: 'MyDockerConn'
              repository: 'python-flask-app'
              command: 'buildAndPush'
              Dockerfile: '$(Build.SourcesDirectory)/Dockerfile' 
              tags: |
                $(Build.BuildId)
                latest